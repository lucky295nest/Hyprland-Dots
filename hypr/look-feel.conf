#################
# LOOK AND FEEL #
#################

source = ~/.config/hypr/theme.conf

general {
    gaps_in = $gaps_in
    gaps_out = $gaps_out

    border_size = $border_size

    col.active_border = $color_active_border
    col.inactive_border = $color_inactive_border

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = $rounding
    rounding_power = $rounding_power

    active_opacity = $active_opacity
    inactive_opacity = $inactive_opacity

    shadow {
        enabled = $shadow_enabled
        range = $shadow_range
        render_power = $shadow_render_power
        color = $color_shadow
    }

    blur {
        enabled = $blur_enabled
        size = $blur_size
        passes = $blur_passes
        xray = $blur_xray
        vibrancy = $blur_vibrancy
    }
}

animations {
    enabled = yes

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = smooth,         0.25, 0.1,  0.25, 1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     7.5,    default
    animation = border,        1,     3.36,  easeOutQuint
    animation = windows,       1,     2.79,  easeOutQuint
    animation = windowsIn,     1,     2.9,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  smooth, slide
    # animation = workspacesIn,  1,     1.21,  almostLinear, fade
    # animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}
